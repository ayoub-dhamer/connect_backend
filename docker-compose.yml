version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: app-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: app-rabbitmq
    ports:
      - "5672:5672" # AMQP protocol (not used directly here, but standard to expose)
      - "61613:61613" # STOMP protocol — this is what Spring connects to
      - "15672:15672" # Management UI (http://localhost:15672)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_stomp rabbitmq_management &&
             rabbitmq-server"

volumes:
  rabbitmq_data:
  minio_data:
