spring.application.name=App

# JWT Secret
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# OAuth2 Configuration (Google)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo

spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariCP
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

spring.datasource.url=jdbc:postgresql://localhost:5432/FlowTrackDB
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# Server Port
server.port=8080
spring.main.allow-bean-definition-overriding=true

stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

#spring.rabbitmq.host=${RABBITMQ_HOST}
#spring.rabbitmq.stomp.port=${RABBITMQ_STOMP_PORT:61613}
#spring.rabbitmq.username=${RABBITMQ_USERNAME}
#spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# ?? File storage (S3-compatible) ??????????????????????????
storage.s3.bucket=${S3_BUCKET:app-uploads}
storage.s3.region=${S3_REGION:us-east-1}
#storage.s3.access-key=${S3_ACCESS_KEY}
#storage.s3.secret-key=${S3_SECRET_KEY}
storage.s3.access-key=${S3_ACCESS_KEY:minioadmin}
storage.s3.secret-key=${S3_SECRET_KEY:minioadmin}
# Leave endpoint blank for real AWS S3. Set for local MinIO dev:
storage.s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
storage.s3.public-url=${S3_PUBLIC_URL:http://localhost:9000/app-uploads}

# ?? File storage ???????????????????????????????????????????
# "local" = save to disk under storage.local.base-dir (default now).
# "s3"    = use S3/MinIO ? switch this once Docker/MinIO is set up.
storage.provider=local

# ?? File upload size limits ????????????????????????????????
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

storage.local.base-dir=uploads
storage.local.public-url-base=http://localhost:8080/uploads

frontend.url=http://localhost:4200